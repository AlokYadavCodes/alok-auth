<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Alok Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Subtle radial glow behind the card */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Top edge highlight line */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .brand-logo {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 600;
            font-size: 14px;
            line-height: 1;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 600;
            color: #ededed;
            letter-spacing: -0.3px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ededed;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #71717a;
            text-align: center;
            margin-bottom: 32px;
        }

        form {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #a1a1aa;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #27272a;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: #0a0a0a;
            color: #ededed;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        input::placeholder {
            color: #3f3f46;
        }

        input:focus {
            outline: none;
            border-color: #ededed;
            box-shadow: 0 0 0 1px #ededed;
        }

        button {
            width: 100%;
            padding: 10px 0;
            background: #ededed;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.15s ease;
        }

        button:hover {
            background: #fff;
        }

	        button:active {
	            background: #d4d4d8;
	        }

	        button:disabled {
	            opacity: 0.72;
	            cursor: not-allowed;
	        }

	        .divider {
	            width: 100%;
	            display: flex;
	            align-items: center;
	            gap: 12px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1a1a1a;
        }

        .divider span {
            font-size: 12px;
            color: #52525b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #71717a;
        }

        .login-link a {
            color: #ededed;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.15s ease;
        }

        .login-link a:hover {
            color: #fff;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        @media (max-width: 440px) {
            .container {
                margin: 16px;
                padding: 36px 24px 32px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="brand">
            <div class="brand-logo">A</div>
            <span class="brand-name">Alok Auth</span>
        </div>
        <h1>Create account</h1>
        <p class="subtitle">Sign up to continue with Alok Auth</p>

        <form method="post" action="/auth/register">
            <input type="hidden" name="flow" id="flow">
            <input type="hidden" name="returnTo" id="return-to">
            <div class="form-group">
                <label for="name">Full name</label>
                <input type="text" name="name" id="name" placeholder="Jane Doe" autocomplete="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" name="email" id="email" placeholder="you@example.com" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••"
                    autocomplete="new-password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm password</label>
                <input type="password" name="confirmPassword" id="confirmPassword" placeholder="••••••••"
                    autocomplete="new-password" required>
            </div>

            <button id="submit-btn" type="submit">Create account</button>
        </form>

        <div class="divider"><span>or</span></div>

        <div class="login-link">
            Already have an account? <a id="login-link" href="/auth/login">Sign in</a>
        </div>
    </div>

    <script>
        const flowInput = document.getElementById('flow');
        const returnToInput = document.getElementById('return-to');
        const loginLink = document.getElementById('login-link');
        const params = new URLSearchParams(window.location.search);

        flowInput.value = params.get('flow') || '';
        returnToInput.value = params.get('returnTo') || '';

        const loginParams = new URLSearchParams();
        if (flowInput.value) {
            loginParams.set('flow', flowInput.value);
        }
        if (returnToInput.value) {
            loginParams.set('returnTo', returnToInput.value);
        }

	        loginLink.href = loginParams.toString()
	            ? `/auth/login?${loginParams.toString()}`
	            : '/auth/login';

	        const form = document.querySelector('form');
	        const submitBtn = document.getElementById('submit-btn');

	        form.addEventListener('submit', function (e) {
	            if (submitBtn.disabled) {
	                e.preventDefault();
	                return;
	            }

	            const password = document.getElementById('password').value;
	            const confirmPassword = document.getElementById('confirmPassword').value;

	            if (password !== confirmPassword) {
	                e.preventDefault();
	                alert('Passwords do not match!');
	                document.getElementById('confirmPassword').focus();
	                return;
	            }

	            if (!form.checkValidity()) {
	                return;
	            }

	            submitBtn.disabled = true;
	            submitBtn.setAttribute('aria-busy', 'true');
	            submitBtn.textContent = 'Creating account...';
	        });
	    </script>
	</body>

</html>
